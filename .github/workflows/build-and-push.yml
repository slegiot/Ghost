name: Build and Push Ghost Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: slegiot/ghost

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build Ghost archive
        run: yarn archive
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Extract archive for Docker
        run: |
          echo "--- Finding archive ---"
          find . -name "ghost-*.tgz" -type f
          ARCHIVE=$(find . -name "ghost-*.tgz" -type f | head -1)
          echo "Using archive: $ARCHIVE"
          mkdir -p docker-context
          tar xzf "$ARCHIVE" -C docker-context --strip-components=1
          echo "--- Contents ---"
          ls -la docker-context/
          echo "--- Admin build check ---"
          ls docker-context/core/built/admin/ 2>/dev/null | head -10 || echo "No admin build found"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context
          file: ./railway.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
